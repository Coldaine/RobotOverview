name: Build RobotOverview image

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Default least-privilege; the publishing job widens its own scope below.
permissions:
  contents: read

# Avoid overlapping builds for the same ref. Cancel superseded PR runs, but never
# cancel a main publish mid-flight — a canceled main run leaves a SHA with no image.
concurrency:
  group: image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: coldaine/robot-overview

jobs:
  image:
    name: Build and publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-ref: ${{ steps.image-ref.outputs.ref }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out RobotOverview
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute deploy image ref
        id: image-ref
        run: echo "ref=${REGISTRY}/${IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=ref,event=pr,prefix=pr-
            type=raw,value=${{ steps.pkg.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # CI-writes-to-GitOps (per coldaine-k8cluster docs/app-delivery.md): commit the new
  # immutable @sha256 digest straight into the cluster repo's main — bot commit, no PR —
  # and the robot-overview Argo Application (automated + selfHeal) rolls the workload.
  # No image-updater, no inbound path to the cluster.
  update-k8cluster:
    name: Deploy digest to coldaine-k8cluster main
    needs: image
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    # Serialize cluster-repo writes so two rapid main merges can't collide on push.
    concurrency:
      group: gitops-write-coldaine-k8cluster
      cancel-in-progress: false
    permissions:
      contents: read # writes happen on the OTHER repo via the App token, not this one
    env:
      # Empty until the GitHub App is configured — lets the job no-op instead of hard-failing.
      APP_READY: ${{ secrets.GITOPS_APP_ID != '' }}
      IMAGE_DIGEST: ${{ needs.image.outputs.image-digest }}
    steps:
      - name: Note if the GitOps App is not configured yet
        if: ${{ env.APP_READY != 'true' }}
        run: |
          echo "::notice::Set GITOPS_APP_ID / GITOPS_APP_KEY (a GitHub App with contents:write on coldaine-k8cluster) to enable auto-deploy. Skipping."

      - name: Mint a scoped GitHub App token for the GitOps repo
        id: app-token
        if: ${{ env.APP_READY == 'true' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_KEY }}
          owner: Coldaine
          repositories: coldaine-k8cluster

      - name: Check out coldaine-k8cluster
        if: ${{ env.APP_READY == 'true' }}
        uses: actions/checkout@v5
        with:
          repository: Coldaine/coldaine-k8cluster
          token: ${{ steps.app-token.outputs.token }}
          path: coldaine-k8cluster
          ref: main
          fetch-depth: 0

      - name: Pin the new image digest and commit to main
        if: ${{ env.APP_READY == 'true' }}
        run: |
          set -euo pipefail
          cd coldaine-k8cluster

          if [ -z "${IMAGE_DIGEST}" ]; then
            echo "::error::No image digest from the build job (was the image pushed?)."
            exit 1
          fi

          target="apps/robot-overview/deployment.yaml"
          if [ ! -f "$target" ]; then
            echo "::notice::$target not found in coldaine-k8cluster; nothing to update."
            exit 0
          fi

          # IMAGE_DIGEST is already 'sha256:...'; pin the immutable digest (maximally reproducible).
          new_ref="ghcr.io/coldaine/robot-overview@${IMAGE_DIGEST}"
          yq -i "(.spec.template.spec.containers[] | select(.name == \"robot-overview\") | .image) = \"${new_ref}\"" "$target"

          if git diff --quiet; then
            echo "robot-overview already pinned to ${new_ref}; nothing to commit."
            exit 0
          fi

          git config user.name "robot-overview-delivery-bot"
          git config user.email "robot-overview-delivery-bot@users.noreply.github.com"
          git add "$target"
          git commit -m "chore(robot-overview): deploy ${GITHUB_SHA:0:12} [skip ci]" -m "Image: ${new_ref}"

          # Rebase-and-retry in case main advanced between checkout and push.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Deployed ${new_ref} to coldaine-k8cluster@main."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing on latest main."
            git fetch origin main
            git rebase origin/main
          done
          echo "::error::Could not push to coldaine-k8cluster@main after 3 attempts."
          exit 1
