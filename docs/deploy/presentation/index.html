<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RobotOverview · Auto-Deploy Pipeline</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#11161f; --panel2:#0d1219; --rim:rgba(120,140,170,.18);
    --ink:#e6edf3; --ink-dim:#93a1b3; --cyan:#36e0e0; --amber:#f5b133;
    --ok:#46d39a; --crit:#ff5d5d; --violet:#8b7fd6;
    --mono:ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace;
    --sans:system-ui,'Inter',-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans);
    display:flex; flex-direction:column; overflow:hidden;
    background-image:
      linear-gradient(rgba(120,140,170,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(120,140,170,.04) 1px,transparent 1px);
    background-size:34px 34px;
  }
  header.bar{
    flex:0 0 auto; display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    padding:12px 18px; border-bottom:1px solid var(--rim);
    background:linear-gradient(180deg,rgba(17,22,31,.96),rgba(13,18,25,.92));
    backdrop-filter:blur(8px); position:relative; z-index:2;
  }
  .brand{display:flex; align-items:center; gap:11px; min-width:0}
  .logo{
    flex:0 0 auto; width:30px; height:30px; display:grid; place-items:center;
    border:1px solid rgba(54,224,224,.4); border-radius:8px; background:rgba(54,224,224,.06);
    box-shadow:0 0 14px rgba(54,224,224,.18);
  }
  .logo svg{width:17px;height:17px}
  .titles{min-width:0}
  .titles h1{
    margin:0; font-size:14px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    color:#dffbfb; text-shadow:0 0 16px rgba(54,224,224,.25); white-space:nowrap;
  }
  .titles p{margin:1px 0 0; font-family:var(--mono); font-size:10.5px; color:var(--ink-dim); letter-spacing:.04em}
  nav.tabs{display:flex; gap:6px; margin-left:auto; flex-wrap:wrap}
  .tab{
    appearance:none; cursor:pointer; font-family:var(--mono); font-size:11px;
    letter-spacing:.1em; text-transform:uppercase; color:var(--ink-dim);
    background:rgba(13,18,25,.6); border:1px solid var(--rim); border-radius:9px;
    padding:8px 13px; display:inline-flex; align-items:center; gap:8px; transition:.18s;
  }
  .tab .ic{width:14px;height:14px;opacity:.85}
  .tab small{font-size:9px;color:var(--ink-dim);opacity:.7}
  .tab:hover{color:var(--ink); border-color:rgba(120,140,170,.4); background:rgba(20,27,38,.7)}
  .tab:focus-visible{outline:2px solid var(--cyan); outline-offset:2px}
  .tab[aria-selected="true"]{
    color:var(--cyan); border-color:rgba(54,224,224,.5); background:rgba(54,224,224,.1);
    box-shadow:0 0 14px rgba(54,224,224,.15);
  }
  .tab[aria-selected="true"] small{color:var(--cyan);opacity:.85}
  .tab[data-view="dashboard"][aria-selected="true"]{
    color:var(--amber); border-color:rgba(245,177,51,.5); background:rgba(245,177,51,.1);
    box-shadow:0 0 14px rgba(245,177,51,.15);
  }
  .tab[data-view="dashboard"][aria-selected="true"] small{color:var(--amber)}
  .spec-link{
    font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--ink-dim); text-decoration:none; border:1px dashed var(--rim); border-radius:8px;
    padding:7px 10px; transition:.18s; white-space:nowrap;
  }
  .spec-link:hover{color:var(--ink); border-color:rgba(120,140,170,.5)}
  .spec-link:focus-visible{outline:2px solid var(--cyan); outline-offset:2px}
  main{flex:1 1 auto; position:relative; min-height:0}
  .frame{position:absolute; inset:0; width:100%; height:100%; border:0; background:var(--bg); opacity:0; transition:opacity .25s}
  .frame.ready{opacity:1}
  .loader{
    position:absolute; inset:0; display:grid; place-items:center; pointer-events:none;
    font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-dim);
  }
  .loader.hidden{display:none}
  .loader .dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--cyan); margin-right:8px; box-shadow:0 0 10px var(--cyan); animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){.frame{transition:none}.loader .dot{animation:none}}
  @media (max-width:620px){
    .titles p{display:none}
    .tab small{display:none}
    .spec-link{display:none}
  }
</style>
</head>
<body>
  <header class="bar">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="#36e0e0" stroke-width="1.6">
          <path d="M12 2l8.5 5v10L12 22 3.5 17V7z"/><path d="M3.7 7.1L12 12l8.3-4.9M12 12v10"/>
        </svg>
      </span>
      <div class="titles">
        <h1>RobotOverview · Auto-Deploy</h1>
        <p>Pull-based CD to k3s via Argo CD — zero-touch on every merge</p>
      </div>
    </div>
    <nav class="tabs" role="tablist" aria-label="Visualization views">
      <button type="button" id="tab-flow" class="tab" role="tab" data-view="flow" aria-selected="true" aria-controls="frame">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="5" cy="12" r="2.4"/><circle cx="19" cy="12" r="2.4"/><path d="M7.4 12h9.2"/><path d="M13 8.5l3.6 3.5-3.6 3.5"/></svg>
        Flow <small>animated</small>
      </button>
      <button type="button" id="tab-story" class="tab" role="tab" data-view="story" aria-selected="false" aria-controls="frame">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M5 7h14M5 12h14M5 17h9"/><path d="M16.5 15.5l3 1.5-3 1.5z" fill="currentColor"/></svg>
        Story <small>scrollytelling</small>
      </button>
      <button type="button" id="tab-dashboard" class="tab" role="tab" data-view="dashboard" aria-selected="false" aria-controls="frame">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="7" height="9" rx="1.2"/><rect x="14" y="3" width="7" height="5" rx="1.2"/><rect x="14" y="11" width="7" height="10" rx="1.2"/><rect x="3" y="15" width="7" height="6" rx="1.2"/></svg>
        Dashboard <small>console</small>
      </button>
    </nav>
    <a class="spec-link" href="../auto-deploy-pipeline.md">📄 Spec</a>
  </header>

  <main>
    <div class="loader" id="loader"><span class="dot"></span>Loading view…</div>
    <iframe class="frame" id="frame" role="tabpanel" aria-labelledby="tab-flow" title="Deploy pipeline view" src="flow.html"></iframe>
  </main>

<script>
(function(){
  var VIEWS = ['flow','story','dashboard'];
  var frame = document.getElementById('frame');
  var loader = document.getElementById('loader');
  var tabs = Array.prototype.slice.call(document.querySelectorAll('.tab'));

  function select(view, push){
    if (VIEWS.indexOf(view) === -1) view = 'flow';
    tabs.forEach(function(t){
      var on = t.getAttribute('data-view') === view;
      t.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    if (loader) loader.classList.remove('hidden');
    frame.classList.remove('ready');
    frame.setAttribute('aria-labelledby', 'tab-' + view);
    frame.src = view + '.html';
    if (push && location.hash !== '#'+view) history.replaceState(null, '', '#'+view);
  }

  frame.addEventListener('load', function(){
    frame.classList.add('ready');
    if (loader) loader.classList.add('hidden');
  });

  tabs.forEach(function(t, i){
    t.addEventListener('click', function(){ select(t.getAttribute('data-view'), true); });
    t.addEventListener('keydown', function(e){
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft'){
        e.preventDefault();
        var dir = e.key === 'ArrowRight' ? 1 : -1;
        var next = tabs[(i + dir + tabs.length) % tabs.length];
        next.focus(); select(next.getAttribute('data-view'), true);
      }
    });
  });

  window.addEventListener('hashchange', function(){
    select((location.hash || '').replace('#',''), false);
  });

  var initial = (location.hash || '').replace('#','');
  select(VIEWS.indexOf(initial) !== -1 ? initial : 'flow', false);
})();
</script>
</body>
</html>
