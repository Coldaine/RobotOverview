version: '3'

tasks:
  default:
    cmds: [task --list]
    silent: true

  bootstrap:core:
    desc: Install/verify core CLI tools and npm dependencies.
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File bootstrap/install-tools.ps1 -Profile core

  bootstrap:dev:
    desc: Install/verify development and review CLIs.
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File bootstrap/install-tools.ps1 -Profile dev -SkipProjectDependencies

  bootstrap:deploy:
    desc: Install/verify deploy-adjacent CLIs; does not run containers.
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File bootstrap/install-tools.ps1 -Profile deploy -SkipProjectDependencies

  bootstrap:tools:
    desc: Install/verify all Hangar local tooling profiles.
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File bootstrap/install-tools.ps1 -Profile all

  bootstrap:
    desc: Install/verify the core Hangar profile.
    cmds:
      - task bootstrap:core

  bootstrap:verify-core:
    desc: Verify core app/agent tooling.
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File bootstrap/verify-tools.ps1 -Profile core

  bootstrap:verify-dev:
    desc: Verify development and review tooling.
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File bootstrap/verify-tools.ps1 -Profile dev

  bootstrap:verify-deploy:
    desc: Verify deploy-adjacent tooling.
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File bootstrap/verify-tools.ps1 -Profile deploy

  bootstrap:verify-tools:
    desc: Verify every Hangar tooling profile.
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File bootstrap/verify-tools.ps1 -Profile all

  dev:
    desc: Start the Next.js development server.
    cmds: [npm run dev]

  lint:
    desc: Run ESLint.
    cmds: [npm run lint]

  test:
    desc: Run Vitest once.
    cmds: [npm run test:run]

  build:
    desc: Build the production Next.js app.
    cmds: [npm run build]

  typecheck:
    desc: Run TypeScript without emitting files.
    cmds: [npm run typecheck]

  check:
    desc: Run the standard Hangar app gate.
    cmds:
      - npm run lint
      - npm run typecheck
      - npm run test:run
      - npm run build
